<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>兔兔老师的物理课堂 - 单摆模拟器</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; background: #fdfaf6; color: #333; }
        canvas { background: #fff; border: 2px solid #666; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .controls { margin: 20px; display: inline-block; text-align: left; background: #eee; padding: 15px; border-radius: 8px; }
        .slider-group { margin-bottom: 10px; }
        label { font-weight: bold; display: inline-block; width: 120px; }
    </style>
</head>
<body>
    <h2>🎯 单摆运动与能量耗散 演示器</h2>
    <p>（高二机械振动/高一机械能守恒 适用）</p>
    
    <div class="controls">
        <div class="slider-group">
            <label>摆长 L (米):</label>
            <input type="range" id="lengthL" min="100" max="250" value="180"> <span id="valL">180</span>
        </div>
        <div class="slider-group">
            <label>空气阻力 (阻尼):</label>
            <input type="range" id="damping" min="0" max="100" value="5"> <span id="valD">0.005</span>
        </div>
        <div class="slider-group">
            <label>重力加速度 g:</label>
            <input type="range" id="gravityG" min="5" max="20" value="10" step="0.5"> <span id="valG">10</span>
        </div>
        <button id="resetBtn" style="width:100%; padding: 8px; background:#007bff; color:#fff; border:none; border-radius:4px; cursor:pointer;">拉开摆球（重置）</button>
    </div>
    <br>
    <canvas id="pendulumCanvas" width="600" height="450"></canvas>

    <script>
        const canvas = document.getElementById('pendulumCanvas');
        const ctx = canvas.getContext('2d');
        
        const originX = 300, originY = 50;
        let angle = Math.PI / 4; // 初始摆角 45 度
        let angleVelocity = 0;
        let angleAcceleration = 0;

        function update() {
            const L = parseFloat(document.getElementById('lengthL').value);
            const b = parseFloat(document.getElementById('damping').value) * 0.001;
            const g = parseFloat(document.getElementById('gravityG').value) * 0.04;

            // 单摆动力学微分方程：α = -(g/L)*sin(θ) - b*ω
            angleAcceleration = (-1 * g / L) * Math.sin(angle) - b * angleVelocity;
            angleVelocity += angleAcceleration;
            angle += angleVelocity;

            // 计算摆球位置
            let ballX = originX + L * Math.sin(angle);
            let ballY = originY + L * Math.cos(angle);

            // 绘图
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 画天花板
            ctx.strokeStyle = '#333'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(200, originY); ctx.lineTo(400, originY); ctx.stroke();
            // 画摆线
            ctx.strokeStyle = '#666'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(originX, originY); ctx.lineTo(ballX, ballY); ctx.stroke();
            // 画摆球
            ctx.fillStyle = '#ff5722'; ctx.beginPath(); ctx.arc(ballX, ballY, 15, 0, Math.PI * 2); ctx.fill();
            // 画中心虚线
            ctx.strokeStyle = '#bbb'; ctx.setLineDash([5, 5]); ctx.beginPath(); ctx.moveTo(originX, originY); ctx.lineTo(originX, originY + 280); ctx.stroke(); ctx.setLineDash([]);

            requestAnimationFrame(update);
        }

        document.getElementById('lengthL').addEventListener('input', (e) => document.getElementById('valL').innerText = e.target.value);
        document.getElementById('damping').addEventListener('input', (e) => document.getElementById('valD').innerText = (e.target.value * 0.001).toFixed(3));
        document.getElementById('gravityG').addEventListener('input', (e) => document.getElementById('valG').innerText = e.target.value);
        document.getElementById('resetBtn').addEventListener('click', () => { angle = Math.PI / 4; angleVelocity = 0; });

        update();
    </script>
</body>
</html>
