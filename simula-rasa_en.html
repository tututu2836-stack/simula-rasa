<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>高一物理教学演示 - 洛伦兹力</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; background: #f0f3f5; }
        canvas { background: #fff; border: 2px solid #333; margin-top: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .controls { margin: 20px; }
        label { margin-right: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>⚡ 带电粒子在磁场中的圆周运动 演示器 ⚡</h2>
    <p>（物理组 专属备课教具）</p>
    <div class="controls">
        <label>磁场强度 B: <input type="range" id="fieldB" min="1" max="10" value="5" step="0.5"> <span id="valB">5</span></label>
        <label>初始速度 v: <input type="range" id="speedV" min="2" max="10" value="5" step="0.5"> <span id="valV">5</span></label>
        <button id="resetBtn" style="padding: 5px 15px; font-size: 14px; cursor: pointer;">发射/重置粒子</button>
    </div>
    <canvas id="simCanvas" width="600" height="400"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        let x, y, vx, vy, q = 1, m = 1;
        let path = [];

        function initParticle() {
            x = 300; y = 350;
            const v = parseFloat(document.getElementById('speedV').value);
            vx = v; vy = 0; path = [];
        }

        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 1;
            for(let i=30; i<canvas.width; i+=30) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let j=30; j<canvas.height; j+=30) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(canvas.width,j); ctx.stroke(); }
            ctx.fillStyle = '#0055ff'; ctx.font = '14px Arial';
            for(let i=15; i<canvas.width; i+=30) { for(let j=15; j<canvas.height; j+=30) { ctx.fillText('×', i, j); } }
        }

        function update() {
            const B = parseFloat(document.getElementById('fieldB').value) * 0.02;
            let ax = (q * vy * B) / m; let ay = (-q * vx * B) / m;
            vx += ax; vy += ay; x += vx; y += vy;
            path.push({x: x, y: y});
            drawGrid();
            ctx.strokeStyle = '#ff3300'; ctx.lineWidth = 3; ctx.beginPath();
            if(path.length > 0) ctx.moveTo(path[0].x, path[0].y);
            for(let p of path) ctx.lineTo(p.x, p.y);
            ctx.stroke();
            ctx.fillStyle = '#ff3300'; ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI*2); ctx.fill();
            requestAnimationFrame(update);
        }

        document.getElementById('fieldB').addEventListener('input', (e) => document.getElementById('valB').innerText = e.target.value);
        document.getElementById('speedV').addEventListener('input', (e) => document.getElementById('valV').innerText = e.target.value);
        document.getElementById('resetBtn').addEventListener('click', initParticle);

        initParticle(); update();
    </script>
</body>
</html>
